name: Tests

# Manual by default. Once the Unity license secrets are set (see
# docs/STEAMWORKS_SETUP.md / README), you can add a `pull_request:` trigger.
on:
  workflow_dispatch:

jobs:
  editmode:
    name: EditMode tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Unity/StackUpPrototype/Library
          key: Library-${{ hashFiles('Unity/StackUpPrototype/Assets/**', 'Unity/StackUpPrototype/Packages/**', 'Unity/StackUpPrototype/ProjectSettings/**') }}
          restore-keys: Library-

      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Unity/StackUpPrototype
          testMode: editmode

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: artifacts
